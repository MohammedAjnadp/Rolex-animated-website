<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Rolex Sea-Dweller 16600</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #ffffff;
            --surface: #111112;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .checkout-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            background: var(--surface);
            padding: 60px;
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .checkout-header {
            grid-column: 1 / -1;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .checkout-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
        }

        .form-section h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: #1a1a1c;
            border: 1px solid var(--border);
            padding: 16px;
            color: white;
            border-radius: 12px;
            font-family: inherit;
        }

        .order-summary {
            background: #1a1a1c;
            padding: 40px;
            border-radius: 24px;
            height: fit-content;
        }

        .product-brief {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            align-items: center;
        }

        .product-brief img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            background: #000;
        }

        .product-info h4 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .product-info p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }

        .summary-row.total {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            margin-top: 24px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .complete-button {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 20px;
            border-radius: 40px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .complete-button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <h1>Secure Checkout</h1>
        </div>

        <div class="form-section">
            <h3>Shipping Information</h3>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com">
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Shipping Address</label>
                <input type="text" placeholder="123 Watch St, London">
            </div>

            <h3 style="margin-top: 40px;">Payment Method</h3>
            <div class="input-group">
                <label>Card Number</label>
                <input type="text" placeholder="xxxx xxxx xxxx xxxx">
            </div>
        </div>

        <div class="order-summary">
            <h3>Order Summary</h3>
            <div class="product-brief">
                <img src="assets/dial.png" alt="Watch Dial">
                <div class="product-info">
                    <h4>Rolex Sea-Dweller</h4>
                    <p>Ref: 16600 (2007)</p>
                </div>
            </div>

            <div class="summary-row">
                <span>Subtotal</span>
                <span>£11,000.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Complimentary</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span>£11,000.00</span>
            </div>

            <button class="complete-button" onclick="alert('Thank you for your purchase. A specialist will contact you shortly.')">Complete Purchase</button>
            <p style="text-align: center; font-size: 0.8rem; color: var(--text-secondary); margin-top: 24px; cursor: pointer;" onclick="window.history.back()">Back to product</p>
        </div>
    </div>
</body>
</html>
